    depends_on:
      postgres:
        condition: service_healthy
    command: python fund_manager_service.py
    environment:
      <<: *agent-env
      AGENT_ID: fund-manager
      # Treasury wallet
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
      TREASURY_WALLET_ADDRESS: ${TREASURY_WALLET_ADDRESS}
      # All 12 agent wallets for fund management
      POLYMARKET_AGENT_PRIVATE_KEY: ${POLYMARKET_AGENT_PRIVATE_KEY}
      POLYMARKET_AGENT_WALLET_ADDRESS: ${POLYMARKET_AGENT_WALLET_ADDRESS}
      YIELD_OPTIMIZER_PRIVATE_KEY: ${YIELD_OPTIMIZER_PRIVATE_KEY:-}
      YIELD_OPTIMIZER_WALLET_ADDRESS: ${YIELD_OPTIMIZER_WALLET_ADDRESS:-}
      ARB_BRIDGE_PRIVATE_KEY: ${ARB_BRIDGE_PRIVATE_KEY:-}
      ARB_BRIDGE_WALLET_ADDRESS: ${ARB_BRIDGE_WALLET_ADDRESS:-}
      MARKETPLACE_SELLER_PRIVATE_KEY: ${MARKETPLACE_SELLER_PRIVATE_KEY:-}
      MARKETPLACE_SELLER_WALLET_ADDRESS: ${MARKETPLACE_SELLER_WALLET_ADDRESS:-}
      RESEARCH_SPAWNER_PRIVATE_KEY: ${RESEARCH_SPAWNER_PRIVATE_KEY:-}
      RESEARCH_SPAWNER_WALLET_ADDRESS: ${RESEARCH_SPAWNER_WALLET_ADDRESS:-}
      ALPHA_SCOUT_PRIVATE_KEY: ${ALPHA_SCOUT_PRIVATE_KEY:-}
      ALPHA_SCOUT_WALLET_ADDRESS: ${ALPHA_SCOUT_WALLET_ADDRESS:-}
      FLASHLOAN_LIQUIDATOR_PRIVATE_KEY: ${FLASHLOAN_LIQUIDATOR_PRIVATE_KEY:-}
      FLASHLOAN_LIQUIDATOR_WALLET_ADDRESS: ${FLASHLOAN_LIQUIDATOR_WALLET_ADDRESS:-}
      LST_DISCOUNT_TRADER_PRIVATE_KEY: ${LST_DISCOUNT_TRADER_PRIVATE_KEY:-}
      LST_DISCOUNT_TRADER_WALLET_ADDRESS: ${LST_DISCOUNT_TRADER_WALLET_ADDRESS:-}
      MICRO_MEAN_REVERSION_PRIVATE_KEY: ${MICRO_MEAN_REVERSION_PRIVATE_KEY:-}
      MICRO_MEAN_REVERSION_WALLET_ADDRESS: ${MICRO_MEAN_REVERSION_WALLET_ADDRESS:-}
      PERP_BASIS_TRADER_PRIVATE_KEY: ${PERP_BASIS_TRADER_PRIVATE_KEY:-}
      PERP_BASIS_TRADER_WALLET_ADDRESS: ${PERP_BASIS_TRADER_WALLET_ADDRESS:-}
      POLY_YIELD_HEDGER_PRIVATE_KEY: ${POLY_YIELD_HEDGER_PRIVATE_KEY:-}
      POLY_YIELD_HEDGER_WALLET_ADDRESS: ${POLY_YIELD_HEDGER_WALLET_ADDRESS:-}
      RETROACTIVE_AIRDROP_FARMER_PRIVATE_KEY: ${RETROACTIVE_AIRDROP_FARMER_PRIVATE_KEY:-}
      RETROACTIVE_AIRDROP_FARMER_WALLET_ADDRESS: ${RETROACTIVE_AIRDROP_FARMER_WALLET_ADDRESS:-}
      # Fund manager settings
      FUND_MANAGER_SCAN_INTERVAL_MINUTES: ${FUND_MANAGER_SCAN_INTERVAL_MINUTES:-10}
      FUND_MANAGER_REBALANCE_INTERVAL_HOURS: ${FUND_MANAGER_REBALANCE_INTERVAL_HOURS:-6}
      FUND_MANAGER_TOPUP_AMOUNT_USDC: ${FUND_MANAGER_TOPUP_AMOUNT_USDC:-25}
      FUND_MANAGER_MIN_AGENT_BALANCE_USDC: ${FUND_MANAGER_MIN_AGENT_BALANCE_USDC:-5}
      FUND_MANAGER_EMERGENCY_THRESHOLD_USDC: ${FUND_MANAGER_EMERGENCY_THRESHOLD_USDC:-50}
      FUND_MANAGER_MIN_TREASURY_RESERVE_USDC: ${FUND_MANAGER_MIN_TREASURY_RESERVE_USDC:-20}
      # Orchestrator settings
      ORCHESTRATOR_INTERVAL_HOURS: ${ORCHESTRATOR_INTERVAL_HOURS:-6}
      ORCHESTRATOR_MAX_GROK_CALLS: ${ORCHESTRATOR_MAX_GROK_CALLS:-6}
      ORCHESTRATOR_GROK_MODEL: ${ORCHESTRATOR_GROK_MODEL:-grok-2-latest}
    volumes:
      - ./logs:/app/logs
      - ./models/trained:/app/models/trained
      - ./reports:/app/reports:rw
    networks:
      - wealth-network
    restart: unless-stopped

  streamlit-dashboard:
    build: .
    container_name: rj-wealth-streamlit
    profiles: ["fleet"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'streamlit run src/streamlit_dashboard.py --server.port 8502 --server.headless true --server.address 0.0.0.0 --browser.gatherUsageStats false'
    environment:
      <<: *agent-env
      DASHBOARD_API_URL: http://rj-wealth-fleet-dashboard:8001
    ports:
      - "127.0.0.1:8502:8502"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports:ro
    networks:
      - wealth-network
    restart: unless-stopped

  content-monetizer:
    build: .
    container_name: rj-wealth-fleet-content
    profiles: ["fleet"]
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    command: python agents/content-monetizer/main.py
    environment:
      <<: *agent-env
      DRY_RUN: "true"  # Inactive — no clear on-chain integration
      AGENT_ID: content-monetizer
      AGENT_PRIVATE_KEY: ${CONTENT_MONETIZER_PRIVATE_KEY:-}
      AGENT_WALLET_ADDRESS: ${CONTENT_MONETIZER_WALLET_ADDRESS:-}
      CONTENT_MONETIZER_CYCLE_MINUTES: ${CONTENT_MONETIZER_CYCLE_MINUTES:-240}
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports:rw
    networks:
      - wealth-network
    restart: unless-stopped

  ecommerce-arb:
    build: .
    container_name: rj-wealth-fleet-ecom
    profiles: ["fleet"]
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    command: python agents/ecommerce-arb/main.py
    environment:
      <<: *agent-env
      DRY_RUN: "true"  # Inactive — early prototype
      AGENT_ID: ecommerce-arb
      AGENT_PRIVATE_KEY: ${ECOMMERCE_ARB_PRIVATE_KEY:-}
      AGENT_WALLET_ADDRESS: ${ECOMMERCE_ARB_WALLET_ADDRESS:-}
