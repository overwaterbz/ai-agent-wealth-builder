  SPAWNER_MIN_CONFIDENCE: ${SPAWNER_MIN_CONFIDENCE:-0.8}
  SPAWNER_MAX_SEED_ALLOCATION_USDC: ${SPAWNER_MAX_SEED_ALLOCATION_USDC:-1500}
  SPAWNER_MIN_TREASURY_BUFFER_USDC: ${SPAWNER_MIN_TREASURY_BUFFER_USDC:-1000}
