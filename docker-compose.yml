services:
  db-backup:
    image: postgres:16-alpine
    container_name: wealth-builder-db-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - backup_data:/backup
    networks:
      - wealth-network
    restart: unless-stopped
    command: >
      sh -c '
        echo "[backup] Service started. First backup in 10 seconds..."; sleep 10;
        while true; do
          FILENAME="/backup/wb_$$(date +%Y%m%d_%H%M).sql.gz";
          echo "[backup] Dumping database to $$FILENAME ...";
          pg_dump -U ${DB_USER:-trading_user} -h wealth-builder-postgres ${DB_NAME:-wealth_builder} | gzip > $$FILENAME;
          echo "[backup] Done. Pruning backups older than 7 days ...";
          find /backup -name "*.sql.gz" -mtime +7 -delete;
          echo "[backup] Next backup in 24h.";
          sleep 86400;
        done
      '

  postgres:
    image: postgres:16-alpine
    container_name: wealth-builder-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-wealth_builder}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealth-network
    restart: unless-stopped

  agent:
    build: .
    container_name: rj-wealth-fleet-polymarket
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    command: python agents/polymarket/main.py
    environment:
      <<: *agent-env
      CYCLE_INTERVAL_MINUTES: ${CYCLE_INTERVAL_MINUTES:-10}
      DASHBOARD_INTERVAL_MINUTES: ${DASHBOARD_INTERVAL_MINUTES:-30}
      MAX_DRAWDOWN_PCT: ${MAX_DRAWDOWN_PCT:-10}
      HARD_STOP_DRAWDOWN_PCT: ${HARD_STOP_DRAWDOWN_PCT:-25}
      DRAWDOWN_MIN_RISK_MULTIPLIER: ${DRAWDOWN_MIN_RISK_MULTIPLIER:-0.25}
      DRAWDOWN_CURVE_EXPONENT: ${DRAWDOWN_CURVE_EXPONENT:-1.6}
      MAX_OPEN_ORDERS: ${MAX_OPEN_ORDERS:-12}
      MAX_CYCLE_ALLOCATION_PCT: ${MAX_CYCLE_ALLOCATION_PCT:-0.35}
      KELLY_FRACTION: ${KELLY_FRACTION:-0.25}
      API_PORT: ${API_PORT:-8000}
      API_HOST: ${API_HOST:-0.0.0.0}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models/trained:/app/models/trained
      - ./reports:/app/reports:rw
    networks:
      - wealth-network
    restart: unless-stopped

