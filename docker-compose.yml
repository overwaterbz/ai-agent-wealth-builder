  grid-trader:
    build: .
    container_name: rj-wealth-fleet-grid
    profiles: ["fleet"]
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    command: python agents/grid-trader/main.py
    environment:
      <<: *agent-env
      DRY_RUN: "false"  # Live — Hyperliquid multi-coin sniper
      AGENT_ID: grid-trader
      SNIPER_COINS: ${SNIPER_COINS:-BTC}
      SNIPER_LEVERAGE: ${SNIPER_LEVERAGE:-20}
      SNIPER_RISK_FRACTION: ${SNIPER_RISK_FRACTION:-0.25}
      SNIPER_SL_PCT: ${SNIPER_SL_PCT:-0.008}
      SNIPER_TP_RATIO: ${SNIPER_TP_RATIO:-2.5}
      SNIPER_MAX_HOLD_HOURS: ${SNIPER_MAX_HOLD_HOURS:-4}
      SNIPER_CYCLE_SECONDS: ${SNIPER_CYCLE_SECONDS:-30}
      SNIPER_PEAK_HOUR_START: ${SNIPER_PEAK_HOUR_START:-8}
      SNIPER_PEAK_HOUR_END: ${SNIPER_PEAK_HOUR_END:-21}
      HYPERLIQUID_PRIVATE_KEY: ${HYPERLIQUID_PRIVATE_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports:rw
    networks:
      - wealth-network
    restart: unless-stopped

  # ── HL Wallet Analyzer — top-wallet pattern discovery ──────────────
  hl-wallet-analyzer:
    build: .
    container_name: rj-wealth-fleet-hl-wallet-analyzer
    profiles: ["fleet"]
    healthcheck:
      test: ["CMD", "python", "-c", "import json, pathlib; p=pathlib.Path('/app/models/top_wallets.json'); exit(0 if p.exists() or True else 1)"]
      interval: 120s
      timeout: 15s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    command: python agents/hl-wallet-analyzer/main.py
    environment:
      <<: *agent-env
      AGENT_ID: hl-wallet-analyzer
      DRY_RUN: "true"
      ANALYZER_CYCLE_HOURS: ${ANALYZER_CYCLE_HOURS:-12}
      ANALYZER_TOP_N: ${ANALYZER_TOP_N:-5}
      ANALYZER_LOOKBACK_DAYS: ${ANALYZER_LOOKBACK_DAYS:-30}
      AUTO_APPLY_PATTERNS: ${AUTO_APPLY_PATTERNS:-false}
      ANALYZER_SEED_WALLETS: ${ANALYZER_SEED_WALLETS:-}
      ANALYZER_MIN_ACCT_VALUE: ${ANALYZER_MIN_ACCT_VALUE:-100}
      ANALYZER_MIN_WIN_RATE: ${ANALYZER_MIN_WIN_RATE:-0.60}
      ANALYZER_MIN_SCREEN_FILLS: ${ANALYZER_MIN_SCREEN_FILLS:-5}
      HYPERLIQUID_PRIVATE_KEY: ${HYPERLIQUID_PRIVATE_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports:rw
    networks:
      - wealth-network
    restart: unless-stopped

  # ── Autonomous Watchdog — 24/7 self-healing monitor ────────────────
  watchdog:
    build: .
    container_name: rj-wealth-watchdog
    healthcheck:
      test: ["CMD", "python", "-c", "import os, json; s=json.load(open('models/watchdog_state.json')); exit(0 if s.get('consecutive_check_failures',0)<3 else 1)"]
      interval: 120s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    command: python watchdog_service.py
    environment:
      <<: *agent-env
      AGENT_ID: watchdog
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-300}
      HEALTH_DIGEST_HOUR_UTC: ${HEALTH_DIGEST_HOUR_UTC:-9}
      AUTO_RESTART_ENABLED: ${AUTO_RESTART_ENABLED:-true}
      SELF_HEAL_ENABLED: ${SELF_HEAL_ENABLED:-true}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - wealth-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  backup_data:
    driver: local

networks:
  wealth-network:
    driver: bridge
