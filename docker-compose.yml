version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: wealth-builder-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-trading_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading_secure_pass}
      POSTGRES_DB: ${DB_NAME:-wealth_builder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealth-network

  # AI Agent Service
  agent:
    build: .
    container_name: wealth-builder-agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-trading_user}:${DB_PASSWORD:-trading_secure_pass}@postgres:5432/${DB_NAME:-wealth_builder}
      
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Web3 / Polygon
      POLYGON_PRIVATE_KEY: ${POLYGON_PRIVATE_KEY}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-https://polygon-rpc.com}
      
      # Trading Config
      DRY_RUN: ${DRY_RUN:-true}
      CYCLE_INTERVAL_MINUTES: ${CYCLE_INTERVAL_MINUTES:-10}
      DASHBOARD_INTERVAL_MINUTES: ${DASHBOARD_INTERVAL_MINUTES:-30}
      MAX_DRAWDOWN_PCT: ${MAX_DRAWDOWN_PCT:-10}
      KELLY_FRACTION: ${KELLY_FRACTION:-0.25}
      
      # API
      API_PORT: ${API_PORT:-8000}
      API_HOST: ${API_HOST:-0.0.0.0}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models/trained:/app/models/trained
    networks:
      - wealth-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  wealth-network:
    driver: bridge
