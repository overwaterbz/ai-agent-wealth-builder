  TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
  TREASURY_MIN_PROFIT_USDC: ${TREASURY_MIN_PROFIT_USDC:-5}
  POLYMARKET_AGENT_PRIVATE_KEY: ${POLYMARKET_AGENT_PRIVATE_KEY}
