  THRESHOLD_TO_COLD: ${THRESHOLD_TO_COLD:-5000}
  COLD_BTC_ADDRESS: ${COLD_BTC_ADDRESS}
  COLD_ETH_ADDRESS: ${COLD_ETH_ADDRESS}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PYTHONPATH: /app
